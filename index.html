<script>
const slides = document.querySelectorAll('.slide');
let current = 0;
// Tiempos en milisegundos para cada pantalla
const TIMING = [4500, 5500, 6000, 7000]; 

function showSlide(n) {
  // 1. Quitar clases a todas para limpiar el terreno
  slides.forEach(s => {
    s.classList.remove('active');
    s.classList.remove('out');
  });

  // 2. La que estaba antes se va (efecto out)
  const oldSlide = slides[current];
  if(oldSlide) oldSlide.classList.add('out');

  // 3. Actualizamos el índice
  current = n;

  // 4. La nueva entra (efecto active)
  const newSlide = slides[current];
  setTimeout(() => {
    newSlide.classList.add('active');
  }, 50);

  // 5. Actualizar Barra de Progreso y Contador
  document.getElementById('slide-counter').textContent = 
    String(current + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
  document.getElementById('progress').style.width = ((current + 1) / slides.length * 100) + '%';
}

function nextSlide() {
  // Intentar play al audio por si el navegador lo bloqueó
  const music = document.getElementById('bgMusic');
  if(music && music.paused) music.play().catch(e => {});

  let next = current + 1;
  if(next >= slides.length) next = 0;
  showSlide(next);
  resetTimer();
}

// Lógica del Timer mejorada
let timer = null;
function resetTimer() {
    clearTimeout(timer);
    // Si no es la última slide, programamos la que sigue
    // Si quieres que la última se quede fija, deja el tiempo en 0 en el array TIMING
    if (TIMING[current] > 0) {
        timer = setTimeout(nextSlide, TIMING[current]);
    }
}

// Arrancar el video por primera vez
window.onload = () => {
    showSlide(0);
    resetTimer();
};

// Eventos de teclado para que tú le muevas
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === ' ') { nextSlide(); }
  if(e.key === 'ArrowLeft' && current > 0) { showSlide(current - 1); }
});
</script>

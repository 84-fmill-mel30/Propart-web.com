    <div id="progress"></div>
    <button id="skip-btn" onclick="nextSlide()">SIGUIENTE →</button>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        const TIMING = [4500, 5500, 6000, 5000, 5000, 5000, 5000, 0]; // 0 para que la última se quede fija
        let timer;

        function showSlide(n) {
            // Limpiar clases
            slides.forEach(s => s.classList.remove('active', 'out'));
            
            // La slide que estaba antes se va
            if (slides[current]) slides[current].classList.add('out');

            // Actualizar índice y mostrar nueva
            current = n;
            slides[current].classList.remove('out');
            slides[current].classList.add('active');

            // Control de video en la S3
            const vid = document.getElementById('vidSol');
            if (current === 2) {
                vid.play().catch(e => {}); 
            } else {
                if(vid) vid.pause();
            }

            // Actualizar barra de progreso
            document.getElementById('progress').style.width = ((current + 1) / slides.length * 100) + "%";

            // Programar la que sigue
            resetTimer();
        }

        function nextSlide() {
            // Activar audio al interactuar
            const music = document.getElementById('bgMusic');
            if(music && music.paused) music.play().catch(e => {});

            let next = (current + 1) % slides.length;
            showSlide(next);
        }

        function resetTimer() {
            clearTimeout(timer);
            if (TIMING[current] > 0) {
                timer = setTimeout(nextSlide, TIMING[current]);
            }
        }

        // Arrancar
        window.onload = () => {
            showSlide(0);
        };
    </script>
